{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<section class="auth-page py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 py-4">
                        <h3 class="mb-0">Login</h3>
                    </div>
                    <div class="card-body px-4 px-sm-5 pb-5">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                <div class="alert alert-{{ category }} mb-3 py-2">
                                    {{ message }}
                                </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="checkOut">
                                <label class="form-check-label" for="checkOut">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
