{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<section class="pb-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
        <h2 class="m-0">Books Collection</h2>
        <a href="/add-book.php" class="btn btn-primary btn-lg w-100 w-md-auto">Add Book</a>
    </div>

    <div class="row g-3">
        {% for book in books %}
        <div class="col-12 col-md-6">
            {% include 'books/book-card.html' %}
        </div>
        {% endfor %}
    </div>
</section>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/book-card.js') }}"></script>
{% endblock %}
